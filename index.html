<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淇淇好萌 屏保 - 音频可视化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Microsoft YaHei, Arial, sans-serif;
            user-select: none;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* 控制面板 */
        .control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .menu-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        .menu-btn.active {
            transform: rotate(45deg);
            background: rgba(255, 107, 107, 0.3);
        }
        
        /* 二级菜单 */
        .submenu {
            position: absolute;
            top: 60px;
            right: 0;
            width: 340px;
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .submenu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .submenu h3 {
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .submenu-section {
            margin-bottom: 20px;
        }
        
        .submenu-section:last-child {
            margin-bottom: 0;
        }
        
        .section-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        /* 选项组 */
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            font-size: 13px;
        }
        
        .option-row label {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 输入框 */
        input[type="text"], select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-size: 13px;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }
        
        input[type="text"]:focus, select:focus {
            border-color: rgba(255, 107, 107, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }
        
        select option {
            background: #1a1a2e;
            color: white;
        }
        
        /* 滑块 */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        
        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff6b6b;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
        
        .slider-value {
            min-width: 40px;
            text-align: right;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* 复选框 */
        .checkbox-wrapper {
            position: relative;
            width: 44px;
            height: 24px;
        }
        
        .checkbox-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .checkbox-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            transition: 0.3s;
        }
        
        .checkbox-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        
        input:checked + .checkbox-slider {
            background: #ff6b6b;
        }
        
        input:checked + .checkbox-slider:before {
            transform: translateX(20px);
        }
        
        /* 按钮组 */
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn-audio {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            animation: pulse 2s infinite;
        }
        
        .btn-audio:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(155, 89, 182, 0.4);
        }
        
        .btn-audio.active {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            animation: none;
        }
        
        .btn-audio:disabled {
            background: rgba(100, 100, 100, 0.5);
            cursor: not-allowed;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(155, 89, 182, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(155, 89, 182, 0); }
        }
        
        /* 快捷预设 */
        .presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .preset-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .preset-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .preset-btn.active {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
            color: white;
        }
        
        /* 颜色选择器 */
        .color-picker {
            display: flex;
            gap: 8px;
        }
        
        .color-option {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        
        .color-option:hover {
            transform: scale(1.2);
        }
        
        .color-option.active {
            border-color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        
        .color-option.active::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        /* 时钟 */
        #clock {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 200;
            color: rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: 10px;
            transition: opacity 0.5s;
        }
        
        #clock.hidden {
            opacity: 0;
        }
        
        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20, 20, 35, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* 快捷键提示 */
        .shortcuts {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            z-index: 100;
        }
        
        .shortcuts kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 4px;
        }
        
        /* 滚动条美化 */
        .submenu::-webkit-scrollbar {
            width: 6px;
        }
        
        .submenu::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .submenu::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        
        .submenu::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* 音频信息面板 */
        .audio-info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 12px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
            min-width: 180px;
        }
        
        .audio-info.active {
            opacity: 1;
            visibility: visible;
        }
        
        .audio-info h4 {
            margin: 0 0 10px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .audio-level {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }
        
        .audio-level-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .audio-level-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00d2d3, #54a0ff);
            border-radius: 3px;
            transition: width 0.05s ease;
        }
        
        .beat-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
            transition: all 0.1s;
        }
        
        .beat-indicator.active {
            background: #ff6b6b;
            box-shadow: 0 0 15px #ff6b6b;
        }
        
        .audio-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 5px;
        }
        
        .audio-status.waiting {
            background: rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }
        
        .audio-status.active {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }
        
        .audio-status.error {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }
        
        /* 频谱样式选择 */
        .spectrum-modes {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        
        .spectrum-mode-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }
        
        .spectrum-mode-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .spectrum-mode-btn.active {
            background: rgba(155, 89, 182, 0.4);
            border-color: #9b59b6;
            color: white;
        }
        
        /* 启动音频提示弹窗 */
        .audio-start-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .audio-start-modal.show {
            opacity: 1;
            visibility: visible;
        }
        
        .audio-start-content {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 400px;
            color: white;
        }
        
        .audio-start-content h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .audio-start-content p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .audio-start-content .btn {
            padding: 15px 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="clock" class="hidden"></div>
    
    <!-- 音频信息面板 -->
    <div class="audio-info" id="audioInfo">
        <h4>🎵 音频可视化</h4>
        <div>状态: <span id="audioStatusText">未启动</span></div>
        <div>输入: <span id="audioSource">-</span></div>
        <div class="audio-level">
            <span>音量</span>
            <div class="audio-level-bar">
                <div class="audio-level-fill" id="audioLevelFill"></div>
            </div>
            <div class="beat-indicator" id="beatIndicator"></div>
        </div>
    </div>
    
    <!-- 音频启动提示 -->
    <div class="audio-start-modal" id="audioStartModal">
        <div class="audio-start-content">
            <h2>🎵 启动音频可视化</h2>
            <p>需要访问您的麦克风来分析音频。<br>音频数据仅在本地处理，不会上传或保存。</p>
            <button class="btn btn-audio" id="modalStartAudioBtn">🎤 允许并启动</button>
            <br><br>
            <button class="btn btn-secondary" id="modalCancelBtn" style="background: transparent; border: none;">取消</button>
        </div>
    </div>
    
    <!-- 控制面板 -->
    <div class="control-panel">
        <button class="menu-btn" id="menuBtn" title="设置">⚙️</button>
        
        <div class="submenu" id="submenu">
            <!-- 音频可视化 -->
            <div class="submenu-section">
                <h3>🎵 音频可视化</h3>
                <div class="option-group">
                    <button class="btn btn-audio" id="audioToggleBtn">
                        🎤 启动麦克风可视化
                    </button>
                    <div style="color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 8px; text-align: center; line-height: 1.5;">
                        需要麦克风权限，音频数据仅在本地处理<br>
                        <span style="color: #ff6b6b;">⚠️ 需要 HTTPS 或 localhost 环境</span>
                    </div>
                </div>
                
                <div class="option-row" style="margin-top: 15px;">
                    <label>🎨 频谱样式</label>
                </div>
                <div class="spectrum-modes">
                    <button class="spectrum-mode-btn active" data-mode="particles">粒子</button>
                    <button class="spectrum-mode-btn" data-mode="bars">柱状图</button>
                    <button class="spectrum-mode-btn" data-mode="circular">环形</button>
                    <button class="spectrum-mode-btn" data-mode="wave">波形</button>
                </div>
                
                <div class="option-row" style="margin-top: 12px;">
                    <label>🔊 灵敏度</label>
                    <div class="slider-container">
                        <input type="range" id="audioSensitivity" min="0.5" max="5" step="0.1" value="2">
                        <span class="slider-value" id="audioSensitivityValue">2.0</span>
                    </div>
                </div>
            </div>
            
            <!-- 快速预设 -->
            <div class="submenu-section">
                <h3>⚡ 快速预设</h3>
                <div class="presets">
                    <button class="preset-btn active" data-preset="default">💕 浪漫</button>
                    <button class="preset-btn" data-preset="classic">🌈 经典</button>
                    <button class="preset-btn" data-preset="energy">🔥 活力</button>
                    <button class="preset-btn" data-preset="minimal">⚪ 极简</button>
                    <button class="preset-btn" data-preset="party">🎉 派对</button>
                </div>
            </div>
            
            <!-- 文字设置 -->
            <div class="submenu-section">
                <h3>📝 文字设置</h3>
                <div class="option-group">
                    <input type="text" id="mainText" placeholder="主文字 (逗号分隔多个)" value="淇淇好萌 ✨,💖 淇淇,✨ 超萌">
                    <input type="text" id="subText" placeholder="装饰文字 (逗号分隔)" value="可爱,萌萌哒,哇~,❤,🌟,💕,✨,🎀,💝,💗">
                </div>
            </div>
            
            <!-- 颜色主题 -->
            <div class="submenu-section">
                <h3>🎨 颜色主题</h3>
                <div class="color-picker" id="colorTheme">
                    <div class="color-option active" data-theme="rainbow" style="background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb)" title="彩虹"></div>
                    <div class="color-option" data-theme="warm" style="background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9f43)" title="暖色"></div>
                    <div class="color-option" data-theme="cool" style="background: linear-gradient(135deg, #48dbfb, #54a0ff, #5f27cd)" title="冷色"></div>
                    <div class="color-option" data-theme="nature" style="background: linear-gradient(135deg, #009432, #78e08f, #38ada9)" title="自然"></div>
                    <div class="color-option" data-theme="pink" style="background: linear-gradient(135deg, #ff9ff3, #f368e0, #ff6b9d)" title="粉色"></div>
                    <div class="color-option" data-theme="gold" style="background: linear-gradient(135deg, #ffd700, #ffa502, #ff7f50)" title="金色"></div>
                </div>
            </div>
            
            <!-- 背景设置 -->
            <div class="submenu-section">
                <h3>🌌 背景设置</h3>
                <div class="option-row">
                    <label>背景风格</label>
                    <select id="bgStyle">
                        <option value="gradient">🌌 深蓝渐变</option>
                        <option value="dark">🌙 暗黑</option>
                        <option value="light">☁️ 明亮</option>
                        <option value="starry">⭐ 星空</option>
                        <option value="sunset">🌅 日落</option>
                        <option value="ocean">🌊 海洋</option>
                        <option value="purple">💜 紫罗兰</option>
                    </select>
                </div>
            </div>
            
            <!-- 动画设置 -->
            <div class="submenu-section">
                <h3>✨ 动画效果</h3>
                <div class="option-group">
                    <div class="option-row">
                        <label>⚡ 动画速度</label>
                        <div class="slider-container">
                            <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">
                            <span class="slider-value" id="speedValue">1.0x</span>
                        </div>
                    </div>
                    
                    <div class="option-row">
                        <label>🔢 装饰文字数量</label>
                        <div class="slider-container">
                            <input type="range" id="textCount" min="0" max="50" value="15">
                            <span class="slider-value" id="textCountValue">15</span>
                        </div>
                    </div>
                    
                    <div class="option-row">
                        <label>✨ 粒子数量</label>
                        <div class="slider-container">
                            <input type="range" id="particleCount" min="0" max="150" value="50">
                            <span class="slider-value" id="particleCountValue">50</span>
                        </div>
                    </div>
                    
                    <div class="option-row">
                        <label>🔤 字体大小</label>
                        <div class="slider-container">
                            <input type="range" id="fontSize" min="40" max="150" value="80">
                            <span class="slider-value" id="fontSizeValue">80</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 效果开关 -->
            <div class="submenu-section">
                <h3>🔧 效果开关</h3>
                <div class="option-group">
                    <div class="option-row">
                        <label>💫 发光效果</label>
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="glowEffect" checked>

        <kbd>S</kbd> 设置 <kbd>F</kbd> 全屏 <kbd>R</kbd> 重置 <kbd>Space</kbd> 暂停 <kbd>A</kbd> 音频
    </div>
    
    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // ==================== 配置 ====================
        const config = {
            mainText: ["淇淇好萌 ✨", "💖 淇淇", "✨ 超萌"],
            subText: ["可爱", "萌萌哒", "哇~", "❤", "🌟", "💕", "✨", "🎀"],
            theme: "rainbow",
            animationSpeed: 0.7,
            particleCount: 80,
            textCount: 20,
            fontSize: 70,
            glowEffect: true,
            rotationEnabled: false,
            bounceEffect: true,
            showClock: false,
            mouseInteraction: true,
            backgroundStyle: "gradient",
            paused: false,
            // 音频配置
            audioEnabled: false,
            audioMode: "circular",
            audioSensitivity: 2
        };
        
        // 主题颜色配置
        const themes = {
            rainbow: ["#ff6b6b", "#feca57", "#48dbfb", "#ff9ff3", "#54a0ff", "#5f27cd", "#00d2d3", "#ff9f43"],
            warm: ["#ff6b6b", "#feca57", "#ff9ff3", "#ff9f43", "#ee5a24", "#ff6348", "#ff7675", "#fdcb6e"],
            cool: ["#48dbfb", "#54a0ff", "#5f27cd", "#00d2d3", "#0652dd", "#9980fa", "#74b9ff", "#a29bfe"],
            nature: ["#009432", "#78e08f", "#38ada9", "#60a3bc", "#f8b500", "#e58e26", "#b8e994", "#82ccdd"],
            pink: ["#ff9ff3", "#f368e0", "#ff6b9d", "#ff9ff3", "#fd79a8", "#e84393", "#f8a5c2", "#f78fb3"],
            gold: ["#ffd700", "#ffa502", "#ff7f50", "#ff6348", "#ff9f43", "#ffc048", "#f7b731", "#e1b12c"]
        };
        
        // 背景配置
        const backgrounds = {
            gradient: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)",
            dark: "#0a0a0a",
            light: "linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)",
            starry: "radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%)",
            sunset: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
            ocean: "linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%)",
            purple: "linear-gradient(135deg, #2d1b69 0%, #0f0c29 100%)"
        };
        
        // 预设配置
        const presets = {
            default: {
                theme: "pink",
                animationSpeed: 0.7,
                particleCount: 80,
                textCount: 20,
                fontSize: 70,
                glowEffect: true,
                rotationEnabled: false,
                bounceEffect: true,
                backgroundStyle: "gradient",
                audioMode: "circular"
            },
            classic: {
                theme: "rainbow",
                animationSpeed: 1,
                particleCount: 50,
                textCount: 15,
                fontSize: 80,
                glowEffect: true,
                rotationEnabled: true,
                bounceEffect: true,
                backgroundStyle: "gradient",
                audioMode: "particles"
            },
            romantic: {
                theme: "pink",
                animationSpeed: 0.7,
                particleCount: 80,
                textCount: 20,
                fontSize: 70,
                glowEffect: true,
                rotationEnabled: false,
                bounceEffect: true,
                backgroundStyle: "gradient",
                audioMode: "circular"
            },
            classic: {
            energy: {
                theme: "warm",
                animationSpeed: 2,
                particleCount: 30,
                textCount: 25,
                fontSize: 90,
                glowEffect: true,
                rotationEnabled: true,
                bounceEffect: true,
                backgroundStyle: "sunset",
                audioMode: "bars"
            },
            minimal: {
                theme: "cool",
                animationSpeed: 0.5,
                particleCount: 10,
                textCount: 5,
                fontSize: 100,
                glowEffect: false,
                rotationEnabled: false,
                bounceEffect: true,
                backgroundStyle: "dark",
                audioMode: "wave"
            },
            party: {
                theme: "rainbow",
                animationSpeed: 2.5,
                particleCount: 100,
                textCount: 30,
                fontSize: 75,
                glowEffect: true,
                rotationEnabled: true,
                bounceEffect: true,
                backgroundStyle: "purple",
                audioMode: "particles"
            }
        };
        
        // ==================== Canvas 设置 ====================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let texts = [];
        let particles = [];
        let animationId;
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // ==================== 音频可视化 ====================
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let dataArray = null;
        let frequencyData = null;
        let audioLevel = 0;
        let beatDetected = false;
        let beatTimeout = null;
        let isAudioInitialized = false;
        
        // 频谱柱状图
        let spectrumBars = [];
        const barCount = 64;
        
        function initSpectrumBars() {
            spectrumBars = [];
            const barWidth = canvas.width / barCount;
            for (let i = 0; i < barCount; i++) {
                spectrumBars.push({
                    x: i * barWidth,
                    width: barWidth - 2,
                    height: 0,
                    targetHeight: 0,
                    color: themes[config.theme][i % themes[config.theme].length]
                });
            }
        }
        
        // 检查浏览器支持
        function checkAudioSupport() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                updateAudioStatus('unsupported', '浏览器不支持');
                return false;
            }
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
                updateAudioStatus('error', '需要 HTTPS');
                return false;
            }
            return true;
        }
        
        function updateAudioStatus(status, message) {
            const statusEl = document.getElementById('audioStatusText');
            const audioBtn = document.getElementById('audioToggleBtn');
            
            if (statusEl) {
                statusEl.textContent = message;
                statusEl.className = 'audio-status ' + status;
            }
            
            if (status === 'active') {
                audioBtn.textContent = '⏹️ 停止音频可视化';
                audioBtn.classList.add('active');
            } else if (status === 'error' || status === 'unsupported') {
                audioBtn.textContent = '❌ ' + message;
                audioBtn.disabled = true;
            } else {
                audioBtn.textContent = '🎤 启动麦克风可视化';
                audioBtn.classList.remove('active');
            }
        }
        
        async function initAudio() {
            if (!checkAudioSupport()) {
                showToast('❌ 当前环境不支持音频可视化');
                return false;
            }
            
            try {
                updateAudioStatus('waiting', '启动中...');
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.8;
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });
                
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                frequencyData = new Uint8Array(bufferLength);
                
                config.audioEnabled = true;
                isAudioInitialized = true;
                initSpectrumBars();
                
                updateAudioStatus('active', '运行中');
                document.getElementById('audioSource').textContent = '麦克风';
                document.getElementById('audioInfo').classList.add('active');
                
                showToast('🎵 音频可视化已启动！');
                return true;
            } catch (err) {
                console.error('音频初始化失败:', err);
                let errorMsg = '权限被拒绝';
                if (err.name === 'NotAllowedError') {
                    errorMsg = '麦克风权限被拒绝';
                } else if (err.name === 'NotFoundError') {
                    errorMsg = '未找到麦克风';
                }
                updateAudioStatus('error', errorMsg);
                showToast('❌ ' + errorMsg);
                return false;
            }
        }
        
        function stopAudio() {
            if (microphone) {
                microphone.disconnect();
                microphone = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            analyser = null;
            config.audioEnabled = false;
            isAudioInitialized = false;
            
            updateAudioStatus('waiting', '已停止');
            document.getElementById('audioSource').textContent = '-';
            document.getElementById('audioInfo').classList.remove('active');
            document.getElementById('audioLevelFill').style.width = '0%';
            document.getElementById('beatIndicator').classList.remove('active');
        }
        
        function analyzeAudio() {
            if (!analyser || !config.audioEnabled) return;
            
            analyser.getByteTimeDomainData(dataArray);
            analyser.getByteFrequencyData(frequencyData);
            
            // 计算音量
            let sum = 0;
            let bassSum = 0;
            const bassRange = Math.floor(frequencyData.length * 0.1);
            
            for (let i = 0; i < dataArray.length; i++) {
                const value = (dataArray[i] - 128) / 128;
                sum += value * value;
            }
            
            for (let i = 0; i < bassRange; i++) {
                bassSum += frequencyData[i];
            }
            
            const rms = Math.sqrt(sum / dataArray.length);
            // 提高基础灵敏度，让轻声也能触发
            audioLevel = Math.min(100, rms * 200 * config.audioSensitivity);
            
            // 检测节拍
            const bassAvg = bassSum / bassRange;
            const beatThreshold = ;
            if (bassAvg > beatThreshold && !beatDetected) {
                beatDetected = true;
                document.getElementById('beatIndicator').classList.add('active');
                onBeat();
                
                clearTimeout(beatTimeout);
                beatTimeout = setTimeout(() => {
                    beatDetected = false;
                    document.getElementById('beatIndicator').classList.remove('active');
                }, 150);
            }
            
            // 更新音量显示
            document.getElementById('audioLevelFill').style.width = audioLevel + '%';
            
            // 更新频谱柱状图
            const step = Math.floor(frequencyData.length / barCount);
            for (let i = 0; i < barCount; i++) {
                const value = frequencyData[i * step];
                spectrumBars[i].targetHeight = (value / 255) * canvas.height * 0.5 * config.audioSensitivity;
                spectrumBars[i].height += (spectrumBars[i].targetHeight - spectrumBars[i].height) * 0.2;
            }
        }
        
        function onBeat() {
            texts.forEach(t => { t.beatScale = 1.5; });
            
            if (config.audioMode === 'particles') {
                for (let i = 0; i < 5; i++) {
                    particles.push(new AudioParticle());
                }
            }
        }
        
        function drawAudioVisualization() {
            if (!config.audioEnabled || !analyser) return;
            
            ctx.save();
            
            switch (config.audioMode) {
                case 'bars':
                    drawSpectrumBars();
                    break;
                case 'circular':
                    drawCircularSpectrum();
                    break;
                case 'wave':
                    drawWaveform();
                    break;
            }
            
            ctx.restore();
        }
        
        function drawSpectrumBars() {
            spectrumBars.forEach((bar, i) => {
                const hue = (i / barCount) * 360;
                const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - bar.height);
                gradient.addColorStop(0, `hsl(${hue}, 100%, 50%)`);
                gradient.addColorStop(1, `hsl(${hue}, 100%, 70%)`);
                
                ctx.fillStyle = gradient;
                ctx.fillRect(bar.x, canvas.height - bar.height, bar.width, bar.height);
                
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#fff';
                ctx.fillRect(bar.x, canvas.height - bar.height - 4, bar.width, 4);
                ctx.shadowBlur = 0;
            });
        }
        
        function drawCircularSpectrum() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) * 0.3;
            
            ctx.translate(centerX, centerY);
            
            spectrumBars.forEach((bar, i) => {
                const angle = (i / barCount) * Math.PI * 2;
                ctx.save();
                ctx.rotate(angle);
                
                const hue = (i / barCount) * 360;
                ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowBlur = 10;
                
                ctx.fillRect(0, radius, 4, bar.height * 0.5);
                ctx.restore();
            });
        }
        
        function drawWaveform() {
            if (!dataArray) return;
            
            ctx.lineWidth = 3;
            ctx.strokeStyle = themes[config.theme][0];
            ctx.shadowColor = themes[config.theme][0];
            ctx.shadowBlur = 10;
            
            ctx.beginPath();
            const sliceWidth = canvas.width / dataArray.length;
            let x = 0;
            
            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128.0;
                const y = (canvas.height / 2) + (v - 1) * canvas.height * 0.3 * config.audioSensitivity;
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                
                x += sliceWidth;
            }
            
            ctx.stroke();
            
            // 镜像波形
            ctx.beginPath();
            x = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128.0;
                const y = (canvas.height / 2) - (v - 1) * canvas.height * 0.3 * config.audioSensitivity;
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                
                x += sliceWidth;
            }
            
            ctx.strokeStyle = themes[config.theme][2];
            ctx.shadowColor = themes[config.theme][2];
            ctx.stroke();
        }
        
        // 音频粒子类
        class AudioParticle {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = 5 + Math.random() * 10;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = 0.02;
                this.size = 5 + Math.random() * 10;
                this.color = themes[config.theme][Math.floor(Math.random() * themes[config.theme].length)];
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        let audioParticles = [];
        
        // ==================== 类定义 ====================
        class FloatingText {
            constructor(text, isMain = false) {
                this.text = text;
                this.isMain = isMain;
                this.fontSize = isMain ? config.fontSize + Math.random() * 40 : config.fontSize * 0.4 + Math.random() * 30;
                ctx.font = `bold ${this.fontSize}px 'Segoe UI', Microsoft YaHei`;
                const metrics = ctx.measureText(this.text);
                this.width = metrics.width;
                this.height = this.fontSize;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = Math.random() * (canvas.height - this.height) + this.height;
                const speed = isMain ? 2 : 1 + Math.random() * 2;
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed * config.animationSpeed;
                this.vy = Math.sin(angle) * speed * config.animationSpeed;
                if (Math.abs(this.vx) < 0.5) this.vx = this.vx > 0 ? 1 : -1;
                if (Math.abs(this.vy) < 0.5) this.vy = this.vy > 0 ? 1 : -1;
                this.color = themes[config.theme][Math.floor(Math.random() * themes[config.theme].length)];
                this.glow = config.glowEffect ? 10 + Math.random() * 20 : 0;
                this.rotation = 0;
                this.rotationSpeed = config.rotationEnabled ? (Math.random() - 0.5) * 0.02 : 0;
                this.scale = 1;
                this.beatScale = 1;
                this.scaleDirection = 0.005;
            }
            
            update() {
                if (config.paused) return;
                
                // 音频响应
                if (config.audioEnabled && analyser) {
                    const speedMultiplier = 1 + (audioLevel / 100) * 0.5;
                    this.x += this.vx * speedMultiplier;
                    this.y += this.vy * speedMultiplier;
                } else {
                    this.x += this.vx;
                    this.y += this.vy;
                }
                
                this.rotation += this.rotationSpeed;
                
                // 呼吸效果
                this.scale += this.scaleDirection;
                if (this.scale > 1.1 || this.scale < 0.9) {
                    this.scaleDirection = -this.scaleDirection;
                }
                
                // 节拍缩放效果衰减
                if (this.beatScale > 1) {
                    this.beatScale -= 0.05;
                    if (this.beatScale < 1) this.beatScale = 1;
                }
                
                if (config.bounceEffect) {
                    if (this.x <= 0) { this.x = 0; this.vx = Math.abs(this.vx); }
                    else if (this.x + this.width >= canvas.width) { this.x = canvas.width - this.width; this.vx = -Math.abs(this.vx); }
                    if (this.y - this.height <= 0) { this.y = this.height; this.vy = Math.abs(this.vy); }
                    else if (this.y >= canvas.height) { this.y = canvas.height; this.vy = -Math.abs(this.vy); }
                } else {
                    if (this.x < -this.width) this.x = canvas.width;
                    else if (this.x > canvas.width) this.x = -this.width;
                    if (this.y < -this.height) this.y = canvas.height + this.height;
                    else if (this.y > canvas.height + this.height) this.y = 0;
                }
                
                if (Math.random() < 0.001) {
                    this.color = themes[config.theme][Math.floor(Math.random() * themes[config.theme].length)];
                }
            }
            
            draw() {
                ctx.save();
                if (config.glowEffect) {
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = this.glow;
                }
                ctx.font = `bold ${this.fontSize}px 'Segoe UI', Microsoft YaHei`;
                ctx.fillStyle = this.color;
                ctx.translate(this.x + this.width / 2, this.y - this.height / 2);
                ctx.rotate(this.rotation);
                const finalScale = this.scale * this.beatScale;
                ctx.scale(finalScale, finalScale);
                ctx.fillText(this.text, -this.width / 2, this.height / 2);
                ctx.restore();
            }
        }
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.color = themes[config.theme][Math.floor(Math.random() * themes[config.theme].length)];
                this.pulse = 0;
            }
            
            update() {
                if (config.paused) return;
                
                if (config.audioEnabled && analyser) {
                    const speedMultiplier = 1 + (audioLevel / 100);
                    this.x += this.speedX * speedMultiplier;
                    this.y += this.speedY * speedMultiplier;
                    this.pulse += 0.05 + (audioLevel / 1000);
                } else {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.pulse += 0.05;
                }
                
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.save();
                const audioBoost = (config.audioEnabled && analyser) ? (audioLevel / 100) * 0.3 : 0;
                const sizeMultiplier = beatDetected ? 1.5 : 1;
                ctx.globalAlpha = this.alpha + Math.sin(this.pulse) * 0.2 + audioBoost;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * sizeMultiplier, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // ==================== 初始化 ====================
        function init() {
            texts = [];
            particles = [];
            audioParticles = [];
            
            config.mainText.forEach(text => {
                if (text.trim()) texts.push(new FloatingText(text.trim(), true));
            });
            
            for (let i = 0; i < config.textCount; i++) {
                const text = config.subText[Math.floor(Math.random() * config.subText.length)];
                texts.push(new FloatingText(text, false));
            }
            
            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
            
            initSpectrumBars();
        }
        
        // ==================== 动画循环 ====================
        function updateClock() {
            if (!config.showClock) return;
            const clock = document.getElementById('clock');
            const now = new Date();
            clock.textContent = now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        }
        
        function animate() {
            analyzeAudio();
            
            ctx.fillStyle = 'rgba(26, 26, 46, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawAudioVisualization();
            
            particles.forEach(p => { p.update(); p.draw(); });
            
            audioParticles = audioParticles.filter(p => p.life > 0);
            audioParticles.forEach(p => { p.update(); p.draw(); });
            
            texts.forEach(t => { t.update(); t.draw(); });
            
            updateClock();
            animationId = requestAnimationFrame(animate);
        }
        
        // ==================== 交互 ====================
        canvas.addEventListener('mousemove', (e) => {
            if (!config.mouseInteraction || config.paused) return;
            
            texts.forEach(t => {
                const dx = t.x + t.width / 2 - e.clientX;
                const dy = t.y - t.height / 2 - e.clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    t.vx += dx * 0.001;
                    t.vy += dy * 0.001;
                }
            });
        });
        
        canvas.addEventListener('click', (e) => {
            if (e.target.closest('.control-panel')) return;
            
            const newText = new FloatingText('淇淇!', false);
            newText.x = e.clientX;
            newText.y = e.clientY;
            texts.push(newText);
            
            if (texts.length > config.textCount + config.mainText.length + 10) {
                texts.splice(config.mainText.length, 1);
            }
        });
        
        // ==================== UI 控制 ====================
        const menuBtn = document.getElementById('menuBtn');
        const submenu = document.getElementById('submenu');
        const audioStartModal = document.getElementById('audioStartModal');
        
        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('active');
            submenu.classList.toggle('active');
        });
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.control-panel')) {
                menuBtn.classList.remove('active');
                submenu.classList.remove('active');
            }
        });
        
        // 音频控制
        const audioToggleBtn = document.getElementById('audioToggleBtn');
        
        function showAudioModal() {
            if (!checkAudioSupport()) {
                showToast('❌ 当前环境不支持音频可视化');
                return;
            }
            audioStartModal.classList.add('show');
        }
        
        function hideAudioModal() {
            audioStartModal.classList.remove('show');
        }
        
        audioToggleBtn.addEventListener('click', () => {
            if (config.audioEnabled) {
                stopAudio();
            } else {
                showAudioModal();
            }
        });
        
        document.getElementById('modalStartAudioBtn').addEventListener('click', async () => {
            hideAudioModal();
            const success = await initAudio();
            if (!success) {
                showToast('❌ 启动失败，请检查麦克风权限');
            }
        });
        
        document.getElementById('modalCancelBtn').addEventListener('click', hideAudioModal);
        
        // 频谱模式选择
        document.querySelectorAll('.spectrum-mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.spectrum-mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                config.audioMode = btn.dataset.mode;
            });
        });
        
        // 音频灵敏度
        document.getElementById('audioSensitivity').addEventListener('input', (e) => {
            config.audioSensitivity = parseFloat(e.target.value);
            document.getElementById('audioSensitivityValue').textContent = config.audioSensitivity.toFixed(1);
        });
        
        // 预设按钮
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const preset = presets[btn.dataset.preset];
                if (preset) {
                    Object.assign(config, preset);
                    applyConfig();
                    updateUI();
                    showToast(`已应用预设: ${btn.textContent}`);
                }
            });
        });
        
        // 颜色主题
        document.querySelectorAll('.color-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                config.theme = opt.dataset.theme;
            });
        });
        
        // 滑块更新
        function bindSlider(id, configKey, suffix = '') {
            const slider = document.getElementById(id);
            const valueLabel = document.getElementById(id + 'Value');
            
            slider.addEventListener('input', () => {
                config[configKey] = parseFloat(slider.value);
                valueLabel.textContent = slider.value + suffix;
            });
        }
        
        bindSlider('speed', 'animationSpeed', 'x');
        bindSlider('textCount', 'textCount');
        bindSlider('particleCount', 'particleCount');
        bindSlider('fontSize', 'fontSize');
        
        // 背景风格
        document.getElementById('bgStyle').addEventListener('change', (e) => {
            config.backgroundStyle = e.target.value;
            document.body.style.background = backgrounds[config.backgroundStyle];
        });
        
        // 复选框
        document.getElementById('glowEffect').addEventListener('change', (e) => {
            config.glowEffect = e.target.checked;
        });
        
        document.getElementById('rotationEffect').addEventListener('change', (e) => {
            config.rotationEnabled = e.target.checked;
        });
        
        document.getElementById('bounceEffect').addEventListener('change', (e) => {
            config.bounceEffect = e.target.checked;
        });
        
        document.getElementById('showClock').addEventListener('change', (e) => {
            config.showClock = e.target.checked;
            document.getElementById('clock').classList.toggle('hidden', !config.showClock);
        });
        
        document.getElementById('mouseInteraction').addEventListener('change', (e) => {
            config.mouseInteraction = e.target.checked;
        });
        
        // 应用按钮
        document.getElementById('applyBtn').addEventListener('click', () => {
            config.mainText = document.getElementById('mainText').value.split(',').map(s => s.trim()).filter(s => s);
            config.subText = document.getElementById('subText').value.split(',').map(s => s.trim()).filter(s => s);
            
            applyConfig();
            showToast('设置已应用!');
            menuBtn.classList.remove('active');
            submenu.classList.remove('active');
        });
        
        // 重置按钮
        document.getElementById('resetBtn').addEventListener('click', () => {
            // 恢复浪漫配置
            Object.assign(config, presets.default);
            document.getElementById('mainText').value = "淇淇好萌 ✨,💖 淇淇,✨ 超萌";
            document.getElementById('subText').value = "可爱,萌萌哒,哇~,❤,🌟,💕,✨,🎀,💝,💗";
            applyConfig();
            updateUI();
            
            // 确保浪漫按钮高亮
            document.querySelectorAll('.preset-btn').forEach(b => {
                b.classList.remove('active');
                if (b.dataset.preset === 'default') {
                    b.classList.add('active');
                }
            });
            
            showToast('已恢复浪漫模式 💕');
        });
        
        function applyConfig() {
            document.body.style.background = backgrounds[config.backgroundStyle];
            document.getElementById('clock').classList.toggle('hidden', !config.showClock);
            init();
        }
        
        function updateUI() {
            document.getElementById('speed').value = config.animationSpeed;
            document.getElementById('speedValue').textContent = config.animationSpeed + 'x';
            document.getElementById('textCount').value = config.textCount;
            document.getElementById('textCountValue').textContent = config.textCount;
            document.getElementById('particleCount').value = config.particleCount;
            document.getElementById('particleCountValue').textContent = config.particleCount;
            document.getElementById('fontSize').value = config.fontSize;
            document.getElementById('fontSizeValue').textContent = config.fontSize;
            document.getElementById('bgStyle').value = config.backgroundStyle;
            document.getElementById('glowEffect').checked = config.glowEffect;
            document.getElementById('rotationEffect').checked = config.rotationEnabled;
            document.getElementById('bounceEffect').checked = config.bounceEffect;
            document.getElementById('showClock').checked = config.showClock;
            
            document.querySelectorAll('.color-option').forEach(o => {
                o.classList.toggle('active', o.dataset.theme === config.theme);
            });
            
            document.querySelectorAll('.preset-btn').forEach(b => {
                b.classList.remove('active');
            });
            
            document.querySelectorAll('.spectrum-mode-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === config.audioMode);
            });
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 's':
                    menuBtn.click();
                    break;
                case 'f':
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                    break;
                case 'r':
                    document.getElementById('resetBtn').click();
                    break;
                case ' ':
                    config.paused = !config.paused;
                    showToast(config.paused ? '已暂停' : '已恢复');
                    e.preventDefault();
                    break;
                case 'a':
                    audioToggleBtn.click();
                    break;
                case 'escape':
                    if (submenu.classList.contains('active')) {
                        menuBtn.classList.remove('active');
                        submenu.classList.remove('active');
                    }
                    if (audioStartModal.classList.contains('show')) {
                        hideAudioModal();
                    }
                    break;
            }
        });
        
        // 检查浏览器支持
        if (!checkAudioSupport()) {
            updateAudioStatus('error', '需要 HTTPS');
        }
        
        // ==================== 启动 ====================
        init();
        animate();
    </script>
</body>
</html>
