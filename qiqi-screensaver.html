<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淇淇好萌 屏保</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Microsoft YaHei, Arial, sans-serif;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            pointer-events: none;
            animation: fadeOut 3s ease-in-out 2s forwards;
        }
        
        @keyframes fadeOut {
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="hint">按任意键或点击鼠标退出提示</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // 彩虹颜色
        const rainbowColors = [
            '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', 
            '#54a0ff', '#5f27cd', '#00d2d3', '#ff9f43',
            '#ee5a24', '#009432', '#0652dd', '#9980fa'
        ];
        
        // 创建文字对象
        class FloatingText {
            constructor(text, isMain = false) {
                this.text = text;
                this.isMain = isMain;
                
                // 随机大小
                this.fontSize = isMain ? 80 + Math.random() * 40 : 30 + Math.random() * 50;
                
                // 测量文字尺寸
                ctx.font = `bold ${this.fontSize}px 'Segoe UI', Microsoft YaHei`;
                const metrics = ctx.measureText(this.text);
                this.width = metrics.width;
                this.height = this.fontSize;
                
                // 随机位置（确保在屏幕内）
                this.x = Math.random() * (canvas.width - this.width);
                this.y = Math.random() * (canvas.height - this.height) + this.height;
                
                // 随机速度（屏保风格：较慢的速度）
                const speed = isMain ? 2 : 1 + Math.random() * 2;
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                // 确保不会静止不动
                if (Math.abs(this.vx) < 0.5) this.vx = this.vx > 0 ? 1 : -1;
                if (Math.abs(this.vy) < 0.5) this.vy = this.vy > 0 ? 1 : -1;
                
                // 随机颜色
                this.color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                
                // 发光效果
                this.glow = 10 + Math.random() * 20;
                
                // 旋转角度
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
            }
            
            update() {
                // 移动
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                
                // 边界检测和反弹
                if (this.x <= 0) {
                    this.x = 0;
                    this.vx = Math.abs(this.vx);
                } else if (this.x + this.width >= canvas.width) {
                    this.x = canvas.width - this.width;
                    this.vx = -Math.abs(this.vx);
                }
                
                if (this.y - this.height <= 0) {
                    this.y = this.height;
                    this.vy = Math.abs(this.vy);
                } else if (this.y >= canvas.height) {
                    this.y = canvas.height;
                    this.vy = -Math.abs(this.vy);
                }
                
                // 偶尔改变颜色
                if (Math.random() < 0.001) {
                    this.color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
                }
            }
            
            draw() {
                ctx.save();
                
                // 发光效果
                ctx.shadowColor = this.color;
                ctx.shadowBlur = this.glow;
                
                // 设置字体
                ctx.font = `bold ${this.fontSize}px 'Segoe UI', Microsoft YaHei`;
                ctx.fillStyle = this.color;
                
                // 绘制文字（带轻微旋转）
                ctx.translate(this.x + this.width / 2, this.y - this.height / 2);
                ctx.rotate(this.rotation);
                ctx.fillText(this.text, -this.width / 2, this.height / 2);
                
                ctx.restore();
            }
        }
        
        // 粒子背景效果
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.color = rainbowColors[Math.floor(Math.random() * rainbowColors.length)];
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 创建文字实例
        const texts = [];
        
        // 主文字
        texts.push(new FloatingText('淇淇好萌 ✨', true));
        texts.push(new FloatingText('💖 淇淇', true));
        texts.push(new FloatingText('✨ 超萌', true));
        
        // 小装饰文字
        const decorations = ['可爱', '萌萌哒', '哇~', '❤', '🌟', '💕', '✨', '🎀'];
        for (let i = 0; i < 15; i++) {
            texts.push(new FloatingText(decorations[Math.floor(Math.random() * decorations.length)], false));
        }
        
        // 创建粒子
        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push(new Particle());
        }
        
        // 动画循环
        function animate() {
            // 清除画布（带拖尾效果）
            ctx.fillStyle = 'rgba(26, 26, 46, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 更新和绘制粒子
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // 更新和绘制文字
            texts.forEach(t => {
                t.update();
                t.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        // 点击添加文字
        canvas.addEventListener('click', (e) => {
            const newText = new FloatingText('淇淇!', false);
            newText.x = e.clientX;
            newText.y = e.clientY;
            texts.push(newText);
            
            // 限制文字数量
            if (texts.length > 25) {
                texts.splice(3, 1); // 保留前3个主文字
            }
        });
        
        // 启动动画
        animate();
    </script>
</body>
</html>
